name: Build & Upload Experimental Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow uploading to releases
permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install build tools
        run: brew install make ldid dpkg

      - name: Clone Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $THEOS

      # ── Rootless (arm64 + arm64e) ────────────────────────────────────────────
      - name: Build rootless package
        run: |
          rm -f packages/*.deb 2>/dev/null || true
          gmake THEOS_PACKAGE_SCHEME=rootless DEBUG=0 package
          mkdir -p dist
          cp packages/*.deb dist/LiquidGlass_rootless.deb

      # ── Rootful / Classic (arm64 + arm64e) ──────────────────────────────────
      - name: Build rootful package
        run: |
          rm -f packages/*.deb 2>/dev/null || true
          gmake THEOS_PACKAGE_SCHEME="" DEBUG=0 package
          mkdir -p dist
          cp packages/*.deb dist/LiquidGlass_rootful.deb

      # ── RootHide (arm64e only) ───────────────────────────────────────────────
      - name: Build roothide package
        run: |
          rm -f packages/*.deb 2>/dev/null || true
          gmake THEOS_PACKAGE_SCHEME=roothide ARCHS=arm64e DEBUG=0 package
          mkdir -p dist
          cp packages/*.deb dist/LiquidGlass_roothide.deb

      # ── Upload all three .deb files to the experimental release ─────────────
      - name: Upload to experimental release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ls -lh dist/
          gh release upload experimental \
            dist/LiquidGlass_rootless.deb \
            dist/LiquidGlass_rootful.deb \
            dist/LiquidGlass_roothide.deb \
            --clobber \
            --repo ${{ github.repository }}
